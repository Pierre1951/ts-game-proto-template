<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TS Game Prototype</title>
    <style>
      body {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: #0a0a0a;
        color: #e0e0e0;
        padding: 1rem;
        line-height: 1.5;
      }
      #hp-display {
        font-weight: bold;
        padding: 0.5rem 0;
      }
      #log {
        white-space: pre-wrap;
        max-height: 60vh;
        overflow-y: auto;
        border: 1px solid #333;
        padding: 0.5rem;
        margin-top: 1rem;
      }
      button {
        background: #2a2a2a;
        color: #e0e0e0;
        border: 1px solid #555;
        padding: 0.5rem 1rem;
        margin-right: 0.5rem;
        cursor: pointer;
      }
      button:hover {
        background: #3a3a3a;
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <h1>TS Game Prototype</h1>
    <div id="hp-display"></div>
    <div>
      <button id="attack-button">Attack (next turn)</button>
      <button id="reset-button">Reset</button>
    </div>
    <div id="log"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
