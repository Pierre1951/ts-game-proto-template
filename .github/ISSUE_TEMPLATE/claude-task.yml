name: Claude タスク
description: Claude Code に実装を依頼する Issue テンプレート
title: "[Task] "
labels: ["claude-task"]
body:
  - type: markdown
    attributes:
      value: |
        Claude Code に自律実装を依頼する Issue です。本文に `@claude` が含まれると Claude Code Action が起動します。

  - type: textarea
    id: context
    attributes:
      label: 背景・目的
      description: 何のために、どのゲームシステムの検証のために、このタスクを依頼するか。
      placeholder: "例: ターン制バトルのCTB(Charge Turn Battle)方式のターン順を計算するロジックを検証したい"
    validations:
      required: true

  - type: textarea
    id: task
    attributes:
      label: 依頼内容
      description: Claude に実装してほしい具体的な内容。対象ファイル、関数シグネチャ、挙動等。
      placeholder: |
        @claude 以下を実装してください。
        - src/domain/turn-order.ts に計算関数を追加
        - シグネチャ: calculateTurnOrder(actors: Actor[]): TurnEntry[]
        - 素早さ順に並び替え、同値の場合は先に登録された順
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 完了条件
      description: テストや挙動の具体的な基準。
      placeholder: |
        - tests/domain/turn-order.test.ts で 4 種以上のケースを検証
        - npm run check が green
        - PR 作成後に gh pr merge --auto --squash --delete-branch が実行されている
    validations:
      required: true
